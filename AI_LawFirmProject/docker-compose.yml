services:
  caddy:
    image: caddy:2.8.4
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - private-ai-net

  streamlit-app:
    build:
      context: .
      dockerfile: streamlit.Dockerfile
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - private-ai-net

  n8n-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LLM_API_BASE=http://llm-server:8080/v1
      - OLLAMA_HOST=http://ollama:11434
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./chroma_db:/app/chroma_db
      - ./storage:/app/storage
      - ./docs:/app/docs
      - ./rag_scripts:/app/rag_scripts
    networks:
      - private-ai-net

  llm-server:
    build:
      context: .
      dockerfile: llm-server.Dockerfile
    restart: unless-stopped
    volumes:
      - ./models:/models
    command:
      - "-m"
      - "/models/${MODEL_FILE:-Phi-4-mini-instruct.Q8_0.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    networks:
      - private-ai-net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - private-ai-net
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  neo4j-db:
    image: neo4j:5.18.1
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD env var must be set}
    volumes:
      - neo4j_data:/data
    networks:
      - private-ai-net

  postgres-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=lexai_admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var must be set}
      - POSTGRES_DB=lexai_memory
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - private-ai-net

  autonomous-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python3", "/app/agents/autonomous_worker.py"]
    environment:
      - NEO4J_URI=bolt://neo4j-db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD env var must be set}
      - LLM_API_BASE=http://llm-server:8080/v1
    volumes:
      - ./agents:/app/agents
      - ./rag_scripts:/app/rag_scripts
    networks:
      - private-ai-net
    depends_on:
      - neo4j-db
      - llm-server

networks:
  private-ai-net:

volumes:
  caddy_data:
  ollama_data:
  neo4j_data:
  pg_data:
