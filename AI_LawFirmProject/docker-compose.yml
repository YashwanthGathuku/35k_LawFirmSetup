services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - private-ai-net

  streamlit-app:
    build:
      context: .
      dockerfile: streamlit.Dockerfile
    restart: unless-stopped
    networks:
      - private-ai-net

  n8n-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LLM_API_BASE=http://llm-server:8080/v1
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./chroma_db:/app/chroma_db
      - ./storage:/app/storage
      - ./docs:/app/docs
      - ./rag_scripts:/app/rag_scripts
    networks:
      - private-ai-net

  llm-server:
    build:
      context: .
      dockerfile: llm-server.Dockerfile
    restart: unless-stopped
    volumes:
      - ./models:/models
    command:
      - "-m"
      - "/models/${MODEL_FILE:-Phi-4-mini-instruct.Q8_0.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    networks:
      - private-ai-net

networks:
  private-ai-net:

volumes:
  caddy_data:
